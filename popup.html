<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YT Speed</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <div class="title-row">
        <img class="logo" src="icon.svg" alt="" />
        <h1>YT Speed</h1>
      </div>
      <label for="rateInput">Playback speed</label>
      <div class="input-row">
        <input
          id="rateInput"
          type="number"
          min="0.1"
          max="16"
          step="0.05"
          inputmode="decimal"
        />
        <button id="applyBtn" type="button">Apply</button>
      </div>

      <div class="preset-row" aria-label="Quick speed presets">
        <button type="button" data-rate="2">2x</button>
        <button type="button" data-rate="2.5">2.5x</button>
        <button type="button" data-rate="3">3x</button>
        <button type="button" data-rate="4">4x</button>
      </div>

      <button id="resetBtn" class="ghost" type="button">Reset to 1x</button>
      <p id="status" role="status" aria-live="polite"></p>
      <p class="hint">Range: 0.1x to 16x. Works on open YouTube tabs.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
