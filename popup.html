<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YT Speed</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <div class="title-row">
        <img class="logo" src="icon.svg" alt="" />
        <h1>YT Speed</h1>
      </div>

      <section class="section">
        <label for="rateInput">Playback speed</label>
        <div class="input-row">
          <input
            id="rateInput"
            type="number"
            min="0.1"
            max="16"
            step="0.05"
            inputmode="decimal"
          />
          <button id="applyBtn" type="button">Apply</button>
        </div>

        <div class="preset-row" aria-label="Quick speed presets">
          <button type="button" data-rate="2">2x</button>
          <button type="button" data-rate="2.5">2.5x</button>
          <button type="button" data-rate="3">3x</button>
          <button type="button" data-rate="4">4x</button>
        </div>

        <button id="resetBtn" class="ghost" type="button">Reset speed to 1x</button>
      </section>

      <section class="section">
        <label for="delayInput">Bluetooth video delay (ms)</label>
        <div class="input-row">
          <input
            id="delayInput"
            type="number"
            min="0"
            max="2500"
            step="10"
            inputmode="numeric"
          />
          <button id="delayApplyBtn" type="button">Apply</button>
        </div>

        <div class="preset-row" aria-label="Quick delay presets">
          <button type="button" data-delay="120">120</button>
          <button type="button" data-delay="180">180</button>
          <button type="button" data-delay="240">240</button>
          <button type="button" data-delay="300">300</button>
        </div>

        <div class="stacked-row">
          <button id="delayResetBtn" class="ghost" type="button">
            Reset delay to 0 ms
          </button>
          <button id="calibrateBtn" type="button">Start Popup Calibration</button>
        </div>

        <div id="calibrationPanel" class="calibration-panel" hidden>
          <canvas
            id="calibrationCanvas"
            width="300"
            height="90"
            aria-label="Calibration sweep preview"
          ></canvas>
          <p id="calibrationStep" class="calibration-meta">
            Click the sweep to drop a marker line where the moving line is.
          </p>
          <input
            id="calibrationOffsetRange"
            type="range"
            min="0"
            max="800"
            step="5"
            value="0"
          />
          <p id="calibrationValue" class="calibration-meta"></p>
          <div class="calibration-row">
            <button id="calibrationNudgeDownBtn" type="button">-10 ms</button>
            <button id="calibrationNudgeUpBtn" type="button">+10 ms</button>
          </div>
          <button id="calibrationResetPreviewBtn" class="ghost" type="button">
            Reset To Saved Delay
          </button>
          <button id="calibrationApplyBtn" type="button">
            Apply This Delay
          </button>
        </div>
      </section>

      <p id="status" role="status" aria-live="polite"></p>
      <p class="hint">
        Calibration runs in this popup: click to set a marker line, click again to replace it.
      </p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
