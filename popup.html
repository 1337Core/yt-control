<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YT Control</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <header class="title-row">
        <img class="logo" src="icon.svg" alt="" />
        <div>
          <h1>YT Control</h1>
        </div>
      </header>

      <section class="section" aria-label="Playback speed controls">
        <div class="label-row">
          <label for="rateInput">Speed</label>
          <output id="rateValue" for="rateInput">1x</output>
        </div>
        <input
          id="rateInput"
          class="slider"
          type="range"
          min="0.1"
          max="8"
          step="0.05"
          value="1"
          title="Double-click to reset to 1x"
        />
        <div class="range-meta" aria-hidden="true">
          <span>0.1</span>
          <span>8x</span>
        </div>
      </section>

      <section class="section" aria-label="Delay controls">
        <div class="label-row">
          <label for="delayInput">Delay</label>
          <output id="delayValue" for="delayInput">0 ms</output>
        </div>
        <input
          id="delayInput"
          class="slider"
          type="range"
          min="0"
          max="2500"
          step="10"
          value="0"
        />
        <div class="range-meta" aria-hidden="true">
          <span>0</span>
          <span>2500 ms</span>
        </div>

        <div class="mic-row">
          <label for="micInputSelect">Mic</label>
          <div class="mic-input-row">
            <select id="micInputSelect" aria-label="Microphone input"></select>
            <button id="refreshMicInputsBtn" type="button">Refresh</button>
          </div>
        </div>

        <div class="action-row">
          <button id="autoCalibrateBtn" class="soft" type="button">Auto</button>
          <button id="calibrateBtn" type="button">Manual</button>
        </div>

        <p id="autoCalibrationStatus" class="calibration-meta auto-calibration-meta">
          Auto checks delay with your mic.
        </p>

        <div id="calibrationPanel" class="calibration-panel" hidden>
          <canvas
            id="calibrationCanvas"
            width="300"
            height="90"
            aria-label="Calibration sweep preview"
          ></canvas>
          <p id="calibrationStep" class="calibration-meta">
            Click the sweep to place a marker.
          </p>

          <div class="label-row small-gap">
            <label for="calibrationOffsetRange">Offset</label>
            <output id="calibrationValue" for="calibrationOffsetRange">0 ms</output>
          </div>
          <input
            id="calibrationOffsetRange"
            class="slider"
            type="range"
            min="0"
            max="800"
            step="5"
            value="0"
          />
          <button id="calibrationApplyBtn" type="button">Apply Offset</button>
        </div>
      </section>

      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
